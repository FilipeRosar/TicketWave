version: "3.9"

services:
  app:
    build:
      context: ../app
      dockerfile: ../app/Dockerfile
    container_name: ticketwave-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - localstack
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test

  postgres:
    image: docker.io/postgres:17
    container_name: ticketwave-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ticketwave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: docker.io/redis:7-alpine
    container_name: ticketwave-redis
    restart: unless-stopped

    ports:
      - "6379:6379"
  localstack:
    image: docker.io/localstack/localstack:3.8
    container_name: ticketwave-localstack

    ports:
      - "4566:4566"

    environment:
      SERVICES: s3,sqs,sns,ses,dynamodb,lambda,cloudwatch,secretsmanager
      DEBUG: 1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test

    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data: